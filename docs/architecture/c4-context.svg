@startuml





skinparam defaultTextAlignment center

skinparam wrapWidth 200
skinparam maxMessageSize 150

skinparam rectangle {
    StereotypeFontSize 12
    shadowing false
}

skinparam database {
    StereotypeFontSize 12
    shadowing false
}

skinparam Arrow {
    Color #666666
    FontColor #666666
    FontSize 12
}

skinparam rectangle<<boundary>> {
    Shadowing false
    StereotypeFontSize 0
    FontColor #444444
    BorderColor #444444
    BorderStyle dashed
}






















skinparam rectangle<<person>> {
    StereotypeFontColor #FFFFFF
    FontColor #FFFFFF
    BackgroundColor #08427B
    BorderColor #073B6F
}

skinparam rectangle<<external_person>> {
    StereotypeFontColor #FFFFFF
    FontColor #FFFFFF
    BackgroundColor #686868
    BorderColor #8A8A8A
}

skinparam rectangle<<system>> {
    StereotypeFontColor #FFFFFF
    FontColor #FFFFFF
    BackgroundColor #1168BD
    BorderColor #3C7FC0
}

skinparam rectangle<<external_system>> {
    StereotypeFontColor #FFFFFF
    FontColor #FFFFFF
    BackgroundColor #999999
    BorderColor #8A8A8A
}

skinparam database<<system>> {
    StereotypeFontColor #FFFFFF
    FontColor #FFFFFF
    BackgroundColor #1168BD
    BorderColor #3C7FC0
}

skinparam database<<external_system>> {
    StereotypeFontColor #FFFFFF
    FontColor #FFFFFF
    BackgroundColor #999999
    BorderColor #8A8A8A
}












hide stereotype
legend right
|=              |= Type |
|<#08427B>      | person |
|<#686868>      | external person |
|<#1168BD>   | system |
|<#999999>      | external system |
endlegend

rectangle "==Emacs user\n\n Developer using Emacs for AI-assisted coding workflows." <<person>> as user
rectangle "==AI Code Interface\n\n Emacs package that provides a unified command hub, prompt/context tooling, backend selection, terminal session management, and optional MCP tools." <<system>> as aiCode
rectangle "==Emacs editor/runtime\n\n Host runtime, buffers, windows, packages, project files, diagnostics, and user interaction APIs." <<external_system>> as emacs
rectangle "==AI coding backends\n\n Configured local CLI tools and supported external Emacs backend packages." <<external_system>> as backends
rectangle "==Local project repository\n\n Source files, Git metadata, prompt/task artifacts, and architecture documents." <<external_system>> as repo

user - -> emacs : "===Uses"
emacs - -> aiCode : "===Loads and invokes package commands"
aiCode - -> repo : "===Reads context and writes prompt/task/architecture artifacts"
aiCode - -> backends : "===Starts, switches to, and sends prompts through configured backend contract"
backends - -> aiCode : "===May call local MCP tools over HTTP when enabled"
aiCode - -> emacs : "===Uses editor APIs, terminal packages, diagnostics, windows, buffers"

@enduml

