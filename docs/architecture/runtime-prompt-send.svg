oints="1308.5,322.01,1318.5,326.01,1308.5,330.01,1312.5,326.01" style="stroke: #A80036; stroke-width: 1.0;"/><line style="stroke: #A80036; stroke-width: 1.0;" x1="1100.5" x2="1314.5" y1="326.01" y2="326.01"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="196" x="1107.5" y="320.201">Resolve current backend/session</text><polygon fill="#A80036" points="1529.5,353.716,1539.5,357.716,1529.5,361.716,1533.5,357.716" style="stroke: #A80036; stroke-width: 1.0;"/><line style="stroke: #A80036; stroke-width: 1.0;" x1="1320.5" x2="1535.5" y1="357.716" y2="357.716"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="197" x="1327.5" y="351.907">Send prompt text and return key</text><polygon fill="#A80036" points="60.5,385.4221,50.5,389.4221,60.5,393.4221,56.5,389.4221" style="stroke: #A80036; stroke-width: 1.0;"/><line style="stroke: #A80036; stroke-width: 1.0;" x1="54.5" x2="1319.5" y1="389.4221" y2="389.4221"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="180" x="66.5" y="383.6131">Display or focus session buffer</text><!--MD5=[4f6f90e00dba665544cae1743cb84c9c]
@startuml
actor "Emacs user" as User
participant "Command hub" as Hub
participant "Code/discussion action" as Action
participant "Prompt mode" as Prompt
participant "Backend dispatcher" as Backend
participant "Session infrastructure" as Session
participant "AI backend" as Cli
database "Prompt file" as PromptFile

User -> Hub: Invoke menu command
Hub -> Action: Run code change, question, explain, or free-form send
Action -> Action: Gather file, region/function, repo, and optional clipboard context
Action -> Prompt: Insert structured prompt
Prompt -> PromptFile: Append Org history entry and backend drawer
Prompt -> Backend: Send final prompt
Backend -> Session: Resolve current backend/session
Session -> Cli: Send prompt text and return key
Session -> User: Display or focus session buffer
@enduml

